<div class="card">

  <img
    [src]="producto.imagen"
    [alt]="producto.nombre"
    class="card-img"
  >

  <div class="card-content">
    <h3>{{ producto.nombre }}</h3>

    <button class="favorite-btn" (click)="toggle()">
      {{ esFavorito ? '★' : '☆' }}
    </button>
  </div>

</div>
